name: snapshot

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".github/workflows/**"

permissions:
  packages: write
  contents: write

jobs:
  build:
    runs-on: windows-latest
    env:
      SCCACHE_GHA_ENABLED: "true"
      SCCACHE_CACHE_SIZE: "5G"
      SCCACHE_C_CUSTOM_CACHE_BUSTER: "${{ github.workflow }}"
      VULKAN_SDK_VERSION: "1.4.313.0"

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${{ env.VULKAN_SDK_VERSION }}"
          $installer = Join-Path $env:RUNNER_TEMP "vulkan-sdk-installer.exe"
          $installRoot = "C:\VulkanSDK"
          $installDir = Join-Path $installRoot $version
          $urls = @(
            "https://sdk.lunarg.com/sdk/download/$version/windows/vulkansdk-windows-X64-$version.exe",
            "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
          )

          $downloaded = $false
          foreach ($url in $urls) {
            try {
              Invoke-WebRequest -Uri $url -OutFile $installer
              $downloaded = $true
              break
            } catch {
              Write-Host "Failed to download Vulkan SDK from $url"
            }
          }

          if (-not $downloaded) {
            throw "Unable to download Vulkan SDK version $version from known installer URLs."
          }

          Start-Process -FilePath $installer -ArgumentList '--root', $installRoot, '--accept-licenses', '--default-answer', '--confirm-command', 'install' -Wait -NoNewWindow

          $sdkCandidates = @(
            $installDir,
            $installRoot,
            (Join-Path $installRoot "SDK"),
            (Join-Path $env:ProgramFiles "VulkanSDK\$version"),
            (Join-Path $env:ProgramFiles "VulkanSDK"),
            (Join-Path ${env:ProgramFiles(x86)} "VulkanSDK\$version"),
            (Join-Path ${env:ProgramFiles(x86)} "VulkanSDK")
          ) | Where-Object { $_ -and (Test-Path $_) }

          $sdkDir = $sdkCandidates | Where-Object {
            (Test-Path (Join-Path $_ 'Include\vulkan\vulkan.h')) -and
            (Test-Path (Join-Path $_ 'Bin'))
          } | Select-Object -First 1

          if (-not $sdkDir) {
            $searchRoots = @($installRoot, (Join-Path $env:ProgramFiles 'VulkanSDK'), (Join-Path ${env:ProgramFiles(x86)} 'VulkanSDK')) |
              Where-Object { $_ -and (Test-Path $_) }

            foreach ($root in $searchRoots) {
              $sdkDir = Get-ChildItem -Path $root -Directory -Recurse -ErrorAction SilentlyContinue |
                Where-Object {
                  (Test-Path (Join-Path $_.FullName 'Include\vulkan\vulkan.h')) -and
                  (Test-Path (Join-Path $_.FullName 'Bin'))
                } |
                Select-Object -ExpandProperty FullName -First 1

              if ($sdkDir) {
                break
              }
            }
          }

          if (-not $sdkDir) {
            throw "Vulkan SDK install directory not found. Checked standard install roots after running the installer."
          }

          Write-Host "Using Vulkan SDK at $sdkDir"
          "VULKAN_SDK=$sdkDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$sdkDir\Bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download Slang binaries
        run: |
          curl -L -o slang.zip https://github.com/shader-slang/slang/releases/download/v2025.10.3/slang-2025.10.3-windows-x86_64.zip
          powershell -Command "Expand-Archive -Path slang.zip -DestinationPath slang_temp -Force; if (!(Test-Path -Path .\bin)) { New-Item -ItemType Directory -Path .\bin }; Copy-Item slang_temp\bin\* .\bin -Force; Remove-Item slang_temp -Recurse -Force"

      - name: Set up Clang
        uses: egor-tensin/setup-clang@v1
        with:
          version: latest
          platform: x64

      - name: Install ninja-build tool
        uses: seanmiddleditch/gha-setup-ninja@v5


      - name: Configure build for amd64
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64

      - name: Configure CMake (x64)
        run: cmake --preset clang-x64 -DCMAKE_C_COMPILER_LAUNCHER=sccache -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Build (x64)
        run: cmake --build --preset clang-x64-release --verbose --target botw

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Prepare Release folder
        run: md githubrelease

      - name: Copy Schema
        run: copy renodx-metadata-schema.json githubrelease\

      - name: Copy Binaries (x64)
        run: copy build\release\*.addon64 githubrelease\

      - name: Copy Binaries (Tools)
        run: copy build\release\*.exe githubrelease\
      
      - name: Copy Binaries (PDBs)
        run: copy build\release\*.pdb githubrelease\
      
      - name: Generate metadata manifest
        run: node scripts/generate-release-manifest.mjs


      - name: Put current date into a variable
        run: |
          $NOW=& Get-Date -format yyyyMMdd
          echo "NOW=$NOW" >> $env:GITHUB_ENV

      - name: Create a Release
        uses: "marvinpinto/action-automatic-releases@latest"
        with:
          repo_token: "${{ secrets.GITHUB_TOKEN }}"
          automatic_release_tag: snapshot
          title: RenoDX Snapshot Build
          files: githubrelease/*
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "githubrelease"

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    permissions:
      pages: write # to deploy to Pages
      id-token: write # to verify the deployment originates from an appropriate source

    # Deploy to the github-pages environment
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    # Specify runner + deployment step
    runs-on: windows-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
